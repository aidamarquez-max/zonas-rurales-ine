name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: zonas-rurales-v5-final/package-lock.json

      - name: Install dependencies
        working-directory: ./zonas-rurales-v5-final
        run: npm ci

      - name: Build
        working-directory: ./zonas-rurales-v5-final
        run: npm run build -- --base=/zonas-rurales-ine/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./zonas-rurales-v5-final/dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4